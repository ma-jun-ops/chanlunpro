<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票涨跌幅</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; }
        .positive { color: #ff4d4f; font-weight: bold; }
        .negative { color: #26a69a; font-weight: bold; }
        .zero { color: #999; }
        .layui-table th { background: #fafafa; }
        .refresh-btn { margin-left: 10px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; padding: 15px; border-radius: 6px; text-align: center; }
        .stat-card.up { background: #fff1f0; border: 1px solid #ffccc7; }
        .stat-card.down { background: #f6ffed; border: 1px solid #b7eb8f; }
        .stat-card.total { background: #e6f7ff; border: 1px solid #91d5ff; }
        .stat-card .num { font-size: 24px; font-weight: bold; }
        .stat-card .label { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>股票涨跌幅统计</h2>
            <div>
                <span style="color: #999; font-size: 12px;">交易时段每5分钟自动更新，15:05补算一次</span>
                <button class="layui-btn layui-btn-sm layui-btn-normal refresh-btn" onclick="refreshData()">
                    <i class="layui-icon layui-icon-refresh"></i> 立即刷新
                </button>
            </div>
        </div>

        <div class="stats" id="stats-area">
            <div class="stat-card up">
                <div class="num positive" id="up-count">0</div>
                <div class="label">上涨</div>
            </div>
            <div class="stat-card down">
                <div class="num negative" id="down-count">0</div>
                <div class="label">下跌</div>
            </div>
            <div class="stat-card total">
                <div class="num" id="total-count">0</div>
                <div class="label">总计</div>
            </div>
        </div>

        <table class="layui-table" lay-size="sm">
            <thead>
                <tr>
                    <th>股票代码</th>
                    <th>股票名称</th>
                    <th>关注日期</th>
                    <th>关注价</th>
                    <th>最新价</th>
                    <th>最新日期</th>
                    <th>涨跌幅</th>
                </tr>
            </thead>
            <tbody id="change-table-body">
                <tr><td colspan="7" style="text-align: center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function formatRate(rate) {
            if (rate > 0) return '<span class="positive">+' + rate + '%</span>';
            if (rate < 0) return '<span class="negative">' + rate + '%</span>';
            return '<span class="zero">0.00%</span>';
        }

        function loadData() {
            $.ajax({
                url: '/api/stock_change',
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    let data = res.data || [];
                    let html = '';
                    let upCount = 0, downCount = 0;

                    if (data.length === 0) {
                        html = '<tr><td colspan="7" style="text-align: center;">暂无数据，请点击"立即刷新"计算涨跌幅</td></tr>';
                    } else {
                        data.forEach(function(item) {
                            if (item.change_rate > 0) upCount++;
                            else if (item.change_rate < 0) downCount++;

                            html += '<tr>';
                            html += '<td>' + item.stock_code + '</td>';
                            html += '<td>' + item.stock_name + '</td>';
                            html += '<td>' + item.follow_date + '</td>';
                            html += '<td>' + parseFloat(item.follow_price).toFixed(2) + '</td>';
                            html += '<td>' + parseFloat(item.latest_price).toFixed(2) + '</td>';
                            html += '<td>' + item.latest_date + '</td>';
                            html += '<td>' + formatRate(item.change_rate) + '</td>';
                            html += '</tr>';
                        });
                    }

                    $('#change-table-body').html(html);
                    $('#up-count').text(upCount);
                    $('#down-count').text(downCount);
                    $('#total-count').text(data.length);
                },
                error: function() {
                    $('#change-table-body').html('<tr><td colspan="7" style="text-align: center; color: red;">加载失败</td></tr>');
                }
            });
        }

        function refreshData() {
            layui.use('layer', function() {
                var layer = layui.layer;
                layer.load(1, { shade: [0.3, '#fff'], content: '<div style="margin-top: 10px; color: #666; font-size: 14px; white-space: nowrap;">正在计算中，请您稍等</div>' });
                
                $.ajax({
                    url: '/api/stock_change/calculate',
                    type: 'POST',
                    success: function(res) {
                        layer.closeAll('loading');
                        if (res.code === 0) {
                            layer.msg('计算完成！', { icon: 1 });
                            loadData();
                        } else {
                            layer.msg('计算失败: ' + res.msg, { icon: 2 });
                        }
                    },
                    error: function() {
                        layer.closeAll('loading');
                        layer.msg('请求失败', { icon: 2 });
                    }
                });
            });
        }

        $(function() {
            loadData();
        });
    </script>
</body>
</html>
